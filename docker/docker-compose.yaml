# =============================================================================
# Development Container — Docker Compose (uid1000 variant)
# =============================================================================
# This variant pins the in-container account to UID=1000, GID=1000, name=uid1000
# regardless of the host user. No HOST_UID/HOST_GID injection is required.
#
# Usage (standalone):
#   cd docker
#   cp .env.example .env            # optional: only for CUDA_VERSION / DISPLAY
#   docker compose build
#   docker compose up -d
#   docker compose exec dev zsh
#
# Usage (devcontainer):
#   Open in VS Code -> "Reopen in Container"
# =============================================================================

name: my-project  # TODO: rename to your project name

services:
  # ---------------------------------------------------------------------------
  # Main development container
  # ---------------------------------------------------------------------------
  dev:  # TODO: rename to your service name
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUDA_VERSION: ${CUDA_VERSION:-12.8.0}
    image: my-project:latest  # TODO: rename to your image name

    environment:
      - HOST_USER=uid1000
      - DISPLAY=${DISPLAY:-:1}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    volumes:
      # Project workspace (host project dir -> container /workspace)
      - ..:/workspace:cached

      # Host git/ssh/auth config (read-only)
      - ${HOME}/.ssh:/home/uid1000/.ssh:ro
      - ${HOME}/.gitconfig:/home/uid1000/.gitconfig:ro
      - ${HOME}/.netrc:/home/uid1000/.netrc:ro

      # X11 / GUI forwarding
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

      # Pip cache (persist across rebuilds)
      - pip-cache:/home/uid1000/.cache/pip

    # Shared memory for PyTorch DataLoader workers, NCCL, etc.
    ipc: host

    # GPU support (NVIDIA)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    stdin_open: true
    tty: true
    working_dir: /workspace

    command: ["sleep", "infinity"]

volumes:
  pip-cache:
