# =============================================================================
# Development Container — Docker Compose (Base Template)
# =============================================================================
# All parameters are read from .devcontainer/.env (generated by init-env.sh
# from pixi.toml + host UID/GID). Run `bash .devcontainer/init-env.sh` once
# before the first build, or use `pixi run build` from the repo root.
#
# Usage (standalone):
#   pixi run build       # docker compose build (after init-env.sh)
#   pixi run up          # docker compose up -d
#   pixi run shell       # docker compose exec dev zsh
#
# Usage (devcontainer):
#   Open in VS Code -> "Reopen in Container"
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Main development container
  # ---------------------------------------------------------------------------
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUDA_VERSION: ${CUDA_VERSION:?run "bash .devcontainer/init-env.sh" first to generate .devcontainer/.env}
        UBUNTU_VERSION: ${UBUNTU_VERSION:?run "bash .devcontainer/init-env.sh" first to generate .devcontainer/.env}
        HOST_UID: ${HOST_UID:?run "bash .devcontainer/init-env.sh" first to generate .devcontainer/.env}
        HOST_GID: ${HOST_GID:?run "bash .devcontainer/init-env.sh" first to generate .devcontainer/.env}
        HOST_USER: ${DEFAULT_USER:?run "bash .devcontainer/init-env.sh" first to generate .devcontainer/.env}
        WORKSPACE_DIR: ${WORKSPACE_DIR:?run "bash .devcontainer/init-env.sh" first to generate .devcontainer/.env}
        LOCALE: ${LOCALE:?run "bash .devcontainer/init-env.sh" first to generate .devcontainer/.env}
    image: ${COMPOSE_PROJECT_NAME}:latest

    environment:
      - HOST_USER=${DEFAULT_USER}
      - DISPLAY=${DISPLAY_NUM}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES}
      - NVIDIA_DRIVER_CAPABILITIES=all

    # Per-machine Doppler token (single file shared by all projects on this
    # host). Loaded only by Compose at container start, not into the host shell.
    # File contents: DOPPLER_TOKEN=dp.st.<config>.<token>
    # Skipped silently when the file does not exist.
    env_file:
      - path: ${HOME}/.config/doppler.env
        required: false

    volumes:
      # Project workspace (host project dir -> container ${WORKSPACE_DIR})
      - ..:${WORKSPACE_DIR}:cached

      # Host git/ssh config (read-only). API tokens come from Doppler instead.
      - ${HOME}/.ssh:/home/${DEFAULT_USER}/.ssh:ro
      - ${HOME}/.gitconfig:/home/${DEFAULT_USER}/.gitconfig:ro

      # Claude Code: share user-level config; auth stays per-container;
      # session history persists across rebuild via the 4 mounts below.
      - ${HOME}/.claude/CLAUDE.md:/home/${DEFAULT_USER}/.claude/CLAUDE.md
      - ${HOME}/.claude/skills:/home/${DEFAULT_USER}/.claude/skills
      - ${HOME}/.claude/agents:/home/${DEFAULT_USER}/.claude/agents
      - ${HOME}/.claude/plugins:/home/${DEFAULT_USER}/.claude/plugins
      - ${HOME}/.claude/hooks:/home/${DEFAULT_USER}/.claude/hooks
      - ${HOME}/.claude/settings.json:/home/${DEFAULT_USER}/.claude/settings.json
      - ${HOME}/.claude/keybindings.json:/home/${DEFAULT_USER}/.claude/keybindings.json
      - ${HOME}/.claude/rules:/home/${DEFAULT_USER}/.claude/rules
      - ${HOME}/.claude/output-styles:/home/${DEFAULT_USER}/.claude/output-styles
      - ${HOME}/.claude/statusline-command.sh:/home/${DEFAULT_USER}/.claude/statusline-command.sh:ro

      # Claude Code session history (per compose project, survives rebuild).
      # Host layout: ~/.claude-stacks/<COMPOSE_PROJECT_NAME>/{projects,sessions,todos,shell-snapshots}
      - ${HOME}/.claude-stacks/${COMPOSE_PROJECT_NAME}/projects:/home/${DEFAULT_USER}/.claude/projects
      - ${HOME}/.claude-stacks/${COMPOSE_PROJECT_NAME}/sessions:/home/${DEFAULT_USER}/.claude/sessions
      - ${HOME}/.claude-stacks/${COMPOSE_PROJECT_NAME}/todos:/home/${DEFAULT_USER}/.claude/todos
      - ${HOME}/.claude-stacks/${COMPOSE_PROJECT_NAME}/shell-snapshots:/home/${DEFAULT_USER}/.claude/shell-snapshots

      # X11 / GUI forwarding
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

      # Pixi/rattler package cache (persist across rebuilds).
      # pixi downloads conda packages into ~/.cache/rattler; persisting it
      # makes subsequent `pixi install` runs near-instant.
      - rattler-cache:/home/${DEFAULT_USER}/.cache/rattler

    # Shared memory for PyTorch DataLoader workers, NCCL, etc.
    ipc: host

    # GPU support (NVIDIA)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    stdin_open: true
    tty: true
    working_dir: ${WORKSPACE_DIR}

    command: ["sleep", "infinity"]

volumes:
  rattler-cache:
